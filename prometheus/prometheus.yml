global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'postgres'
    static_configs:
      - targets: ['lab-postgres-exporter:9187']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['lab-cadvisor:8080']

  - job_name: 'alloy'
    static_configs:
      - targets: ['lab-alloy:12345']

  - job_name: 'node'
    static_configs:
      - targets: ['lab-node-exporter:9100']