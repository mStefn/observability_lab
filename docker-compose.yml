services:
  # ==========================================
  # 1. THE TARGET: Baza danych do monitorowania
  # ==========================================
  postgres:
    image: postgres:15
    container_name: lab-postgres
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=lab_db
    ports:
      - "5432:5432"
    command: postgres -c shared_preload_libraries=pg_stat_statements -c pg_stat_statements.track=all
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - monitoring_net

  # ==========================================
  # 2. COLLECTORS & EXPORTERS: Zbieracze danych
  # ==========================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: lab-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://user:password@postgres:5432/lab_db?sslmode=disable
    depends_on:
      - postgres
    networks:
      - monitoring_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: lab-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring_net

  alloy:
    image: grafana/alloy:latest
    container_name: lab-alloy
    restart: always
    user: root
    ports:
      - "12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    networks:
      - monitoring_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: lab-cadvisor
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring_net

  # ==========================================
  # 3. STORAGE & VISUALIZATION: Bazy metryk i Grafana
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: lab-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    networks:
      - monitoring_net

  loki:
    image: grafana/loki:latest
    container_name: lab-loki
    ports:
      - "3100:3100"
    networks:
      - monitoring_net

  grafana:
    image: grafana/grafana:latest
    container_name: lab-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring_net

networks:
  monitoring_net:
    driver: bridge